[workspace]
members = [
    "crates/canvas",
    "crates/divider",
    "crates/ipg-alignment",
    "crates/ipg-helpers",
    "crates/ipg-styling",
    "crates/ipg-types",
    "crates/ipg-widgets",
    "crates/ipg-window",
    "ipg-fonts",
]
resolver = "2"

# Shared dependencies - use with { workspace = true } in member crates
[workspace.dependencies]
pyo3 = { version = "0.26", features = ["extension-module"] }
iced = { version = "0.14", features = ["advanced", "canvas", "debug", "highlighter", "image", 
"lazy", "smol", "svg", "tokio"] }
iced_aw = { version = "0.13.0", features = ["full"] }
polars = { version = "0.52", default-features = false, features = [
    "csv",
    "dtype-date",
    "dtype-datetime",
    "fmt",
    "lazy",
    "temporal",
    "strings",
    "timezones",
    "performant",
] }
pyo3-polars = "0.25.0"
tokio = { version = "1.0", features = ["fs"] }
rfd = "0.13"
once_cell = "1.19.0"
chrono = "0.4.31"
unicode-segmentation = "1.9.0"
palette = "0.7.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
phf = { version = "0.11", default-features = false }
regex = "1.11.1"
resvg = "0.45.1"

# Internal crates
canvas = { path = "crates/canvas" }
divider = { path = "crates/divider"}
ipg-alignment = { path = "crates/ipg-alignment" }
ipg-fonts = { path = "ipg-fonts" }
ipg-helpers = { path = "crates/ipg-helpers" }
ipg-styling = { path = "crates/ipg-styling" }
ipg-types = { path = "crates/ipg-types" }
ipg-widgets = { path = "crates/ipg-widgets" }
ipg-window = { path = "crates/ipg-window" }

[package]
authors = ["Charles Ray <ray-iced-projects@gmail.com>"]
name = "icedpygui"
version = "0.4.0"
edition = "2024"
license = "GNU"
description = "Python wrapper for Rust Iced"
readme = "README.md"

[lib]
name = "icedpygui"
crate-type = ["cdylib"]

[dependencies]
# Internal crates
canvas = { workspace = true }
divider = { workspace = true }
ipg-alignment = { workspace = true }
ipg-helpers = { workspace = true }
ipg-styling = { workspace = true }
ipg-types = { workspace = true }
ipg-widgets = { workspace = true }
ipg-window ={ workspace = true }


# External dependencies
pyo3 = { workspace = true }
iced = { workspace = true }
iced_aw = { workspace = true }
polars = { workspace = true }
pyo3-polars = { workspace = true }
tokio = { workspace = true }
rfd = { workspace = true }
once_cell = { workspace = true }
chrono = { workspace = true }
unicode-segmentation = { workspace = true }
palette = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
phf = { workspace = true }
regex = { workspace = true }
resvg = { workspace = true }


[build-dependencies]
pyo3-build-config = { version = "0.26", features = ["resolve-config"] }

[profile.release]
strip = true
lto = "fat"
codegen-units = 1
opt-level = 3
